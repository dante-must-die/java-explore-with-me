version: '3.8'
services:
  stats-db:
    image: postgres:16.1
    container_name: stats-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - stats-db-data:/var/lib/postgresql/data

  stats-server:
    build:
      context: .
      dockerfile: ./stats/stats-server/Dockerfile
    container_name: stats-server
    depends_on:
      - stats-db
    ports:
      - "9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  ewm-db:
    image: postgres:16.1
    container_name: ewm-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ewm-db-data:/var/lib/postgresql/data

  ewm-service:
    build:
      context: .
      dockerfile: ./ewm-service/Dockerfile
    container_name: ewm-service
    depends_on:
      - ewm-db
    ports:
      - "8080:8080"
    environment:
      SOME_ENV: some_value

volumes:
  stats-db-data:
  ewm-db-data:
